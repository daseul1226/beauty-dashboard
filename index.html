<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>뷰티 트렌드 대시보드</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    padding: 30px;
    background: #f0f0f0;
    font-family: 'Arial', sans-serif;
    color: #333;
    text-align: center;
}

h1 {
    font-size: 3em;
}

.welcome {
    font-size: 1.2em;
    margin-bottom: 30px;
}

.platform-btn {
    padding: 8px 16px;
    margin: 5px;
    border: none;
    border-radius: 20px;
    background: white;
    cursor: pointer;
}

.platform-btn.active {
    background: #333;
    color: white;
}

.keyword {
    display: inline-block;
    margin: 5px;
    padding: 6px 12px;
    background: white;
    border-radius: 20px;
}

.card {
    display: inline-block;
    width: 200px;
    margin: 10px;
    padding: 15px;
    background: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-5px);
}

table {
    margin: 30px auto;
    background: white;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #eee;
}
</style>
</head>

<body>

<h1>환영합니다!</h1>
<p class="welcome">저의 공간을 찾아주셔서 감사합니다!</p>

<div>
<button class="platform-btn active" onclick="loadData(event,'xiaohongshu')">샤오홍슈</button>
<button class="platform-btn" onclick="loadData(event,'amazon')">아마존</button>
<button class="platform-btn" onclick="loadData(event,'oliveyoung')">올리브영</button>
</div>

<div id="keywords"></div>
<div id="products"></div>

<canvas id="chart" height="100"></canvas>

<table>
<thead>
<tr><th>키워드</th><th>언급량</th><th>증가율</th></tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

// 🔥 포폴용 mock 데이터 (API 없이 동작)
const DATA = {
    xiaohongshu: {
        keywords: ["글로우메이크업","중국뷰티","립추천"],
        products: [{name:"립틴트"}, {name:"쿠션팩트"}],
        table: [
            {k:"글로우", v:12000, g:"+20%"},
            {k:"립틴트", v:9000, g:"+15%"}
        ]
    },
    amazon: {
        keywords: ["비건","클린뷰티","선케어"],
        products: [{name:"비건크림"}, {name:"선케어"}],
        table: [
            {k:"비건", v:8000, g:"+12%"},
            {k:"선케어", v:6000, g:"+8%"}
        ]
    },
    oliveyoung: {
        keywords: ["저자극","토너패드","마스크팩"],
        products: [{name:"토너패드"}, {name:"마스크팩"}],
        table: [
            {k:"토너패드", v:7000, g:"+18%"},
            {k:"마스크팩", v:5000, g:"+9%"}
        ]
    }
}

let chart;

function loadData(event, platform){

    document.querySelectorAll(".platform-btn").forEach(btn=>{
        btn.classList.remove("active")
    })
    event.target.classList.add("active")

    const data = DATA[platform]

    // 키워드
    document.getElementById("keywords").innerHTML =
        data.keywords.map(k=>`<span class="keyword">#${k}</span>`).join("")

    // 제품
    document.getElementById("products").innerHTML =
        data.products.map(p=>`
            <div class="card" onclick="goDetail('${p.name}')">
                ${getSVG()}
                <div>${p.name}</div>
            </div>
        `).join("")

    // 테이블
    document.getElementById("table").innerHTML =
        data.table.map(t=>`
            <tr>
                <td>${t.k}</td>
                <td>${t.v}</td>
                <td>${t.g}</td>
            </tr>
        `).join("")

    drawChart(data)
}

// SVG 일러스트
function getSVG(){
return `
<svg viewBox="0 0 100 100" width="100%" height="100">
<rect x="20" y="20" width="60" height="60" rx="12" fill="#ddd"/>
<circle cx="50" cy="40" r="8" fill="#bbb"/>
<rect x="35" y="55" width="30" height="12" rx="5" fill="#bbb"/>
</svg>`
}

// 차트
function drawChart(data){

    if(chart) chart.destroy()

    const ctx = document.getElementById("chart")

    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: data.table.map(t=>t.k),
            datasets: [{
                label: '언급량',
                data: data.table.map(t=>t.v)
            }]
        }
    })
}

// 상세 페이지 이동
function goDetail(name){
    location.href = "detail.html?product=" + name
}

// 초기 실행
window.onload = ()=> loadData({target:document.querySelector(".platform-btn")}, 'xiaohongshu')

</script>

</body>
</html>
